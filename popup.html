<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMAT 错题整理助手</title>
  <style>
    /* ===== 全局重置 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #333;
      background: #f7f8fa;
    }

    /* ===== 头部 ===== */
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .header-version {
      font-size: 11px;
      opacity: 0.7;
    }
    .settings-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .settings-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    /* ===== 状态区域 ===== */
    .status-section {
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok { background: #34a853; }
    .status-dot.warn { background: #fbbc04; }
    .status-dot.error { background: #ea4335; }
    .status-text {
      font-size: 13px;
      color: #555;
    }
    .status-count {
      font-size: 15px;
      font-weight: 600;
      color: #1a73e8;
    }

    /* ===== 操作区域 ===== */
    .action-section {
      padding: 16px 20px;
    }
    .action-stack {
      display: grid;
      gap: 10px;
    }
    .download-btn {
      width: 100%;
      padding: 12px 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .download-btn:hover:not(:disabled) {
      background: #1557b0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26,115,232,0.3);
    }
    .download-btn:disabled {
      background: #c4c4c4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .secondary-btn {
      background: #137333;
    }
    .secondary-btn:hover:not(:disabled) {
      background: #0f5d29;
      box-shadow: 0 4px 12px rgba(19,115,51,0.28);
    }
    .download-btn .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .download-btn.loading .spinner { display: block; }
    .download-btn.loading .btn-text { display: none; }
    .download-btn.loading .btn-loading-text { display: inline; }
    .btn-loading-text { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== 进度/结果提示 ===== */
    .message-bar {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .message-bar.show { display: block; }
    .message-bar.info {
      background: #e8f0fe;
      color: #1a73e8;
    }
    .message-bar.success {
      background: #e6f4ea;
      color: #137333;
    }
    .message-bar.error {
      background: #fce8e6;
      color: #c5221f;
    }

    /* ===== 选项区域 ===== */
    .options-section {
      padding: 0 20px 12px;
    }
    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .option-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #1a73e8;
    }
    .option-row label {
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }

    /* ===== 历史记录 ===== */
    .history-section {
      padding: 0 20px 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clear-btn {
      font-size: 11px;
      color: #999;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .clear-btn:hover {
      color: #ea4335;
      background: #fce8e6;
    }
    .history-list {
      max-height: 150px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #fff;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .history-count {
      font-weight: 600;
      color: #1a73e8;
    }
    .history-time {
      color: #999;
    }
    .empty-state {
      text-align: center;
      color: #bbb;
      font-size: 12px;
      padding: 12px 0;
    }

    /* ===== 设置面板 ===== */
    .settings-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
    }
    .settings-overlay.show { display: flex; align-items: center; justify-content: center; }
    .settings-panel {
      background: #fff;
      border-radius: 12px;
      width: 340px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .settings-panel h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-label {
      font-size: 13px;
      color: #333;
    }
    .settings-desc {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider {
      background: #1a73e8;
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }
    .settings-close {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: #333;
    }
    .settings-close:hover {
      background: #e0e0e0;
    }
    .settings-input {
      width: 100%;
      margin-top: 8px;
      padding: 9px 10px;
      border: 1px solid #d9dce1;
      border-radius: 8px;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .settings-input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
    }
    .settings-item.column {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 头部 -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📝</div>
      <div>
        <h1>GMAT 错题助手</h1>
        <div class="header-version">v3.1</div>
      </div>
    </div>
    <button class="settings-btn" id="settingsBtn" title="设置">⚙</button>
  </div>

  <!-- 状态 -->
  <div class="status-section">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">检测中...</span>
    </div>
    <div class="status-count" id="statusCount"></div>
  </div>

  <!-- 选项 -->
  <div class="options-section">
    <div class="option-row">
      <input type="checkbox" id="includeScreenshots">
      <label for="includeScreenshots">包含题目截图（生成较慢）</label>
    </div>
  </div>

  <!-- 操作 -->
  <div class="action-section">
    <div class="action-stack">
      <button class="download-btn" id="downloadBtn" disabled>
        <span class="spinner"></span>
        <span class="btn-text">📥 下载错题 Excel</span>
        <span class="btn-loading-text">正在处理...</span>
      </button>
      <button class="download-btn secondary-btn" id="uploadBtn" disabled>
        <span class="spinner"></span>
        <span class="btn-text">☁️ 上传到网站</span>
        <span class="btn-loading-text">正在上传...</span>
      </button>
    </div>
    <div class="message-bar" id="messageBar"></div>
  </div>

  <!-- 历史 -->
  <div class="history-section">
    <div class="section-title">
      <span>下载历史</span>
      <button class="clear-btn" id="clearHistoryBtn">清空</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">暂无下载记录</div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <h2>⚙ 设置</h2>
      <div class="settings-item">
        <div>
          <div class="settings-label">包含题目截图</div>
          <div class="settings-desc">在 Excel 中嵌入题目和解析截图</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="settingScreenshots">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="settings-item column">
        <div class="settings-label">网站地址</div>
        <div class="settings-desc">例如 http://localhost:3000 或你的线上域名</div>
        <input class="settings-input" id="settingSiteBaseUrl" type="url" placeholder="https://your-gmat-site.vercel.app">
      </div>
      <div class="settings-item column">
        <div class="settings-label">Admin Key</div>
        <div class="settings-desc">插件直传会用这个密钥调用网站的导入接口</div>
        <input class="settings-input" id="settingAdminKey" type="password" placeholder="请输入部署环境里的 ADMIN_KEY">
      </div>
      <button class="settings-close" id="closeSettings">关闭</button>
    </div>
  </div>

  <!-- 加载 ExcelJS 库（支持嵌入图片） -->
  <script src="lib/exceljs.min.js"></script>
  <!-- 弹窗逻辑 -->
  <script src="popup.js"></script>
</body>
</html>
